name: Test Build (develop)

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '*.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Python tests
  # ─────────────────────────────────────────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install dependencies
        run: |
          cd python
          pip install -r requirements.txt -q
          pip install pytest pytest-asyncio httpx -q

      - name: Run pytest
        run: |
          cd python
          pytest tests/ -v

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend build test
  # ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Electron build test
  # ─────────────────────────────────────────────────────────────────────────────
  test-electron:
    needs: test-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: |
          cd python
          pip install -r requirements.txt -q
          pip install pyinstaller -q

      - name: Build Python sidecar
        run: |
          cd python
          python -m PyInstaller main.py --onefile --name metalens-sidecar --distpath dist --clean --noconfirm \
            --hidden-import piexif \
            --hidden-import mutagen \
            --hidden-import hachoir \
            --hidden-import olefile \
            --hidden-import openpyxl \
            --hidden-import docx \
            --hidden-import pptx \
            --hidden-import pypdf

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend dist into electron
        run: cp -r frontend/dist electron/frontend

      - name: Test Electron package setup
        run: |
          cd electron
          npm ci --include=dev
