version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: /python
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Route version-update PRs to develop (dev branch); main is release-only.
    # NOTE: Dependabot *security* updates ignore target-branch and always
    # target the default branch (main). See README/notes below.
    target-branch: develop
    rebase-strategy: auto
    labels:
      - dependencies
      - python

  # Node.js (Electron)
  - package-ecosystem: npm
    directory: /electron
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: develop
    rebase-strategy: auto
    labels:
      - dependencies
      - javascript
    ignore:
      # tar vulnerabilities - no upstream fix available
      # These are false positives for a desktop app: hardlink traversal/symlink poisoning
      # don't apply to our app packaging workflow (electron-forge)
      - dependency-name: tar
      # tmp vulnerabilities - no upstream fix available
      # These are false positives: symlink attacks don't apply as MetaLens doesn't
      # use tmp for untrusted input (only internal tempfiles for metadata operations)
      - dependency-name: tmp

  # Node.js (Frontend)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    target-branch: develop
    rebase-strategy: auto
    labels:
      - dependencies
      - javascript
